        :root {

            margin: 0;
            padding: 0;

            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        body {
            background-color: var(--background);
            background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, footer {
            width: 100%;
            text-align: center;
            padding: 15px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

            font-size: 1.2rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        footer {
            background: #333;
            font-size: 0.9rem;
            margin-top: auto;
            letter-spacing: 0.5px;

        .container {

            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);

        /* Login Screen */
        .login-screen {

            gap: 15px;
        }

        .login-screen h2 {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, opacity 0.3s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-start { background-color: var(--primary); }
        .btn-home { background-color: #607D8B; margin-bottom: 20px; }
        
        /* Riwayat Skor Login Screen */
        .history-box {
            margin-top: 20px;
            border-top: 2px dashed #ddd;
            padding-top: 20px;
        }
        
        .history-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            border-left: 4px solid var(--secondary);
            font-size: 0.9rem;
        }

        /* Quiz Area */
        .quiz-screen {
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            color: #1565c0;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .question-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            display: block;
            border: 2px solid #eee;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-btn {
            background-color: #f1f1f1;
            color: #333;
            text-align: left;
            padding: 15px;
            border: 2px solid transparent;
        }

        .option-btn.correct {
            background-color: var(--correct) !important;
            color: white !important;
            border-color: #388E3C !important;
        }

        .option-btn.wrong {
            background-color: var(--wrong) !important;
            color: white !important;
            border-color: #D32F2F !important;
        }

        .explanation-box {

            border-left: 5px solid #ff9800;

            justify-content: space-between;
            margin-top: 20px;

            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
        }

    </style>
</head>

            return acak;
        }

        // Tampilkan riwayat lokal dan set tahun footer otomatis
        function inisialisasiAwal() {
            const dataRekap = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const riwayatIni = dataRekap.filter(d => d.mapel === KODE_MAPEL || d.mapel === "IPAS");
            
            const divRiwayat = document.getElementById('riwayatLokal');
            if(riwayatIni.length === 0){
                divRiwayat.innerHTML = "Belum ada riwayat pengerjaan.";
            } else {
                let html = "";
                riwayatIni.slice(-5).reverse().forEach(item => {
                    html += `<div class="history-item">👤 ${item.nama} (${item.kelas}) | <strong>Skor: ${item.nilai}</strong> | 🕒 ${item.waktu}</div>`;
                });
                divRiwayat.innerHTML = html;
            }

            const elemenTahun = document.getElementById('tahunCopyright');
            if(elemenTahun) {
                elemenTahun.innerText = new Date().getFullYear();
            }
        }

        document.addEventListener('DOMContentLoaded', inisialisasiAwal);

        // --- FUNGSI AUTO-SAVE ---
        function simpanProgres() {
            const dataProgres = {
                nama: namaUser,
                kelas: kelasUser,
                kuisArray: kuisArray, 
                indexSoal: indexSoal,
                skorMentah: skorMentah
            };
            localStorage.setItem(PROGRESS_KEY, JSON.stringify(dataProgres));
        }

        function hapusProgres() {
            localStorage.removeItem(PROGRESS_KEY);
        }

        function mulaiKuis() {
            namaUser = document.getElementById('namaSiswa').value.trim();
            kelasUser = document.getElementById('kelasSiswa').value.trim();
            
            if(!namaUser || !kelasUser) {
                alert("Harap isi Nama dan Kelas terlebih dahulu!");
                return;
            }

            const savedData = JSON.parse(localStorage.getItem(PROGRESS_KEY));
            if (savedData && savedData.nama.toLowerCase() === namaUser.toLowerCase() && savedData.kelas.toLowerCase() === kelasUser.toLowerCase()) {
                const lanjut = confirm(`Halo ${namaUser}, kamu memiliki sesi kuis yang belum selesai.\nIngin melanjutkan dari soal terakhir tanpa kehilangan progres?`);
                
                if (lanjut) {
                    kuisArray = savedData.kuisArray;
                    indexSoal = savedData.indexSoal;
                    skorMentah = savedData.skorMentah;
                    masukKeLayarKuis();
                    return; 
                } else {
                    hapusProgres(); 
                }
            }

            skorMentah = 0;
            indexSoal = 0;
            kuisArray = acakArray(bankSoal); 
            masukKeLayarKuis();
        }

        function masukKeLayarKuis() {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            document.getElementById('teksNama').innerHTML = `👤 <strong>${namaUser.toUpperCase()}</strong>`;
            document.getElementById('teksKelas').innerText = `Kelas: ${kelasUser}`;
            
            tampilkanSoal();
        }

        function tampilkanSoal() {
            const soalData = kuisArray[indexSoal];
            isAnswered = soalData.terjawab || false; 
            
            document.getElementById('soalCounter').innerText = `Soal: ${indexSoal + 1} / ${kuisArray.length}`;
            document.getElementById('pembahasanContainer').style.display = 'none';
            
            // Atur Navigasi (Membuka kunci otomatis jika sudah dijawab)
            document.getElementById('btnPrev').style.display = (indexSoal > 0) ? 'inline-block' : 'none';
            if (soalData.terjawab) {
                if (indexSoal < kuisArray.length - 1) {
                    document.getElementById('btnNext').style.display = 'inline-block';
                    document.getElementById('btnSelesai').style.display = 'none';
                } else {
                    document.getElementById('btnNext').style.display = 'none';
                    document.getElementById('btnSelesai').style.display = 'inline-block';
                }
            } else {
                document.getElementById('btnNext').style.display = 'none';
                document.getElementById('btnSelesai').style.display = 'none';
            }

            let htmlSoal = `<div class="question-text">${indexSoal + 1}. ${soalData.pertanyaan}</div>`;
            
            if(soalData.gambar) {
                htmlSoal += `<img src="${soalData.gambar}" alt="Gambar Soal ${indexSoal+1}" class="question-image" onerror="this.style.display='none'">`;
            }

            if (!soalData.opsiAcak) {
                let opsiDenganIndex = soalData.pilihan.map((teks, i) => ({ teks, indeksAsli: i }));
                soalData.opsiAcak = acakArray(opsiDenganIndex);
                simpanProgres(); 
            }

            let htmlOpsi = `<div class="options-grid">`;
            soalData.opsiAcak.forEach((opsi, i) => {
                // Sembunyikan atribut kebenaran jawaban dengan dataset
                let isBenar = (opsi.indeksAsli === soalData.jawabanBenar) ? 'true' : 'false';
                htmlOpsi += `<button class="option-btn" id="btn-opsi-${i}" data-benar="${isBenar}" onclick="cekJawaban(this, ${opsi.indeksAsli}, ${soalData.jawabanBenar}, ${i})">${opsi.teks}</button>`;
            });
            htmlOpsi += `</div>`;

            document.getElementById('soalContainer').innerHTML = htmlSoal + htmlOpsi;
            
            if (soalData.terjawab) {
                const btn = document.getElementById(`btn-opsi-${soalData.indeksTombolTerpilih}`);
                cekJawaban(btn, soalData.indeksPilihanUser, soalData.jawabanBenar, soalData.indeksTombolTerpilih, true);
            } else {
                updateSkorTampilan();
            }
        }

        function cekJawaban(btn, indeksDipilih, indeksBenar, indeksTombol, isRestoring = false) {
            if(isAnswered && !isRestoring) return; 
            isAnswered = true;

            const soalData = kuisArray[indexSoal];

            if (!isRestoring) {
                soalData.terjawab = true;
                soalData.indeksPilihanUser = indeksDipilih;
                soalData.indeksTombolTerpilih = indeksTombol;
                if (indeksDipilih === indeksBenar) {
                    skorMentah++; 
                }
                simpanProgres();
            }

            // PERBAIKAN LOGIKA WARNA
            const semuaTombol = document.querySelectorAll('.option-btn');
            semuaTombol.forEach(b => {
                b.style.pointerEvents = 'none'; 
                // Cek akurat menggunakan atribut data-benar
                if(b.getAttribute('data-benar') === 'true') {
                    b.classList.add('correct'); // Jawaban benar selalu menjadi hijau
                }
            });

            // Jika jawaban yang dipilih pengguna salah, maka jadikan tombol pilihannya menjadi merah
            if (indeksDipilih !== indeksBenar) {
                btn.classList.add('wrong');
            }

            updateSkorTampilan();

            const boxBahas = document.getElementById('pembahasanContainer');
            boxBahas.innerHTML = `<strong>Pembahasan:</strong> ${kuisArray[indexSoal].pembahasan}`;
            boxBahas.style.display = 'block';

            if (indexSoal < kuisArray.length - 1) {
                document.getElementById('btnNext').style.display = 'inline-block';
            } else {
                document.getElementById('btnSelesai').style.display = 'inline-block';
            }
        }

        function updateSkorTampilan() {
            let persentaseSkor = Math.round((skorMentah / kuisArray.length) * 100);
            let skorAkhir = Math.min(persentaseSkor, SKOR_MAKSIMAL);
            document.getElementById('liveScore').innerText = `Skor Sementara: ${skorAkhir}`;
        }

        function soalSelanjutnya() {
            if (indexSoal < kuisArray.length - 1) {
                indexSoal++;
                tampilkanSoal();
            }
        }

        function soalSebelumnya() {
            if (indexSoal > 0) {
                indexSoal--;
                tampilkanSoal();
            }
        }

        function selesaiKuis() {
            let persentaseSkor = Math.round((skorMentah / kuisArray.length) * 100);
            let skorAkhir = Math.min(persentaseSkor, SKOR_MAKSIMAL);

            const btnSelesai = document.getElementById('btnSelesai');
            btnSelesai.innerText = "Menyimpan Data...";
            btnSelesai.disabled = true;

            hapusProgres();

            const dataRekap = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            dataRekap.push({
                nama: namaUser,
                kelas: kelasUser,
                mapel: KODE_MAPEL,
                nilai: skorAkhir,
                waktu: new Date().toLocaleString('id-ID')
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataRekap));

            const scriptURL = 'https://script.google.com/macros/s/AKfycbwzCsI_5uv5jreQHSiNW5Dej7Iu-5Sui0uYhwIWGFwcsm8kM09C20JMwjDO8ZZRMGAs/exec'; 
            
            const payload = {
                nama: namaUser,
                kelas: kelasUser,
                mapel: "IPAS", 
                nilai: skorAkhir
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => {
                alert(`Kuis Selesai!\nSkor Akhir Anda: ${skorAkhir}\nData Anda telah berhasil direkam ke dalam sistem.`);
                window.location.reload(); 
            })
            .catch(error => {
                console.error("Gagal mengirim ke server guru:", error);
                alert(`Pemberitahuan: Skor Anda (${skorAkhir}) tersimpan di perangkat, namun koneksi ke server guru sedang terganggu.`);
                window.location.reload(); 
            });
        }
    </script>
</body>
</html>

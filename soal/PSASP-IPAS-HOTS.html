        /* CSS & Tampilan Umum */
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --background: #f4f7f6;
            --text: #333;
            --correct: #4CAF50;
            --wrong: #f44336;
            --header-bg: #ff9800;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Proteksi Anti Copy Paste */
            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        body {
            background-color: var(--background);
            background-image: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header, footer {
            width: 100%;
            text-align: center;
            padding: 15px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header {
            background: linear-gradient(90deg, #ff9800, #ff5722);
            font-size: 1.2rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        footer {
            background: #333;
            font-size: 0.9rem;
            margin-top: auto;
            letter-spacing: 0.5px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: white;
            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-screen h2 {
            text-align: center;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.1s, opacity 0.3s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-start { background-color: var(--primary); }
        .btn-home { background-color: #607D8B; margin-bottom: 20px; }
        
        /* Riwayat Skor Login Screen */
        .history-box {
            margin-top: 20px;
            border-top: 2px dashed #ddd;
            padding-top: 20px;
        }
        
        .history-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            border-left: 4px solid var(--secondary);
            font-size: 0.9rem;
        }

        /* Quiz Area */
        .quiz-screen {
            display: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            color: #1565c0;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .question-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            display: block;
            border: 2px solid #eee;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-btn {
            background-color: #f1f1f1;
            color: #333;
            text-align: left;
            padding: 15px;
            border: 2px solid transparent;
        }

        .option-btn.correct {
            background-color: var(--correct);
            color: white;
            border-color: #388E3C;
        }

        .option-btn.wrong {
            background-color: var(--wrong);
            color: white;
            border-color: #D32F2F;
        }

        .explanation-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fff3e0;
            border-left: 5px solid #ff9800;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .nav-btn { background-color: var(--secondary); display: none; }
        .finish-btn { background-color: var(--primary); display: none; width: 100%; }

        /* Tampilan Profil User yang Keren */
        .user-profile-bar {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }
        .user-profile-bar .badge-kelas {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
        }

    </style>
</head>

            { pertanyaan: "Perubahan fisik utama yang menandai masa pubertas pada anak laki-laki akibat hormon testosteron adalah tumbuhnya...", pilihan: ["Jakun pada leher", "Rambut pada kepala", "Kuku pada jari", "Gigi pada rahang"], jawabanBenar: 0, pembahasan: "Membesarnya laring yang membentuk jakun dan merubah suara menjadi berat adalah ciri sekunder pubertas pria." },
            { pertanyaan: "Alasan utama para pemuda menculik Soekarno-Hatta ke Rengasdengklok adalah agar kedua tokoh proklamator tersebut segera...", pilihan: ["Menjauhkan pengaruh Jepang", "Mendapatkan bantuan Jepang", "Membentuk kabinet Jepang", "Menyusun konstitusi Jepang"], jawabanBenar: 0, pembahasan: "Golongan muda ingin proklamasi dipercepat tanpa menunggu janji kemerdekaan dari pihak Jepang (PPKI)." },
            { pertanyaan: "Langkah konkret terbaik yang bisa siswa lakukan di kantin sekolah untuk mengurangi produksi sampah plastik adalah...", pilihan: ["Membawa botol minum", "Membeli botol kemasan", "Membakar botol kemasan", "Menimbun botol kemasan"], jawabanBenar: 0, pembahasan: "Tumbler/botol minum pribadi mencegah terbentuknya sampah kemasan plastik sekali pakai di sekolah." },
            { pertanyaan: "Langkah pertama yang paling tepat dalam merancang jurnal proyek pembuatan kincir air sederhana di sekolah adalah...", pilihan: ["Menentukan tujuan proyek", "Menyiapkan bahan proyek", "Mencatat hasil proyek", "Mempresentasikan hasil proyek"], jawabanBenar: 0, pembahasan: "Dalam metode ilmiah, menetapkan tujuan/rumusan masalah adalah langkah awal sebelum menyusun alat bahan." }
        ];

        // --- SISTEM VARIABEL & FLAG (Skor tidak melampaui 100) ---
        let kuisArray = [];
        let indexSoal = 0;
        let skorMentah = 0;
        const SKOR_MAKSIMAL = 100; // Pembatas (Limiter)
        let isAnswered = false; // Sistem Flagging per soal
        let namaUser = "";
        let kelasUser = "";
        const KODE_MAPEL = "PSASP-IPAS-HOTS"; 
        // Kunci localStorage disamakan dengan rekap.html ("dataKuis") agar bisa berkomunikasi
        const STORAGE_KEY = "dataKuis"; 

        // Fungsi Acak Array (Fisher-Yates)
        function acakArray(arr) {
            let acak = [...arr];
            for (let i = acak.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [acak[i], acak[j]] = [acak[j], acak[i]];
            }
            return acak;
        }

        // Tampilkan riwayat lokal di layar login tanpa tumpang tindih
        function renderRiwayatLokal() {
            const dataRekap = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            // FILTER DILONGGARKAN: Menampilkan "PSASP-IPAS-HOTS" dan juga riwayat yang telanjur berlabel "IPAS"
            const riwayatIni = dataRekap.filter(d => d.mapel === KODE_MAPEL || d.mapel === "IPAS");
            
            const divRiwayat = document.getElementById('riwayatLokal');
            if(riwayatIni.length === 0){
                divRiwayat.innerHTML = "Belum ada riwayat pengerjaan.";
                return;
            }
            let html = "";
            riwayatIni.forEach(item => {
                html += `<div class="history-item">👤 ${item.nama} (${item.kelas}) | <strong>Skor: ${item.nilai}</strong> | 🕒 ${item.waktu}</div>`;
            });
            divRiwayat.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', renderRiwayatLokal);

        function mulaiKuis() {
            namaUser = document.getElementById('namaSiswa').value.trim();
            kelasUser = document.getElementById('kelasSiswa').value.trim();
            
            if(!namaUser || !kelasUser) {
                alert("Harap isi Nama dan Kelas terlebih dahulu!");
                return;
            }

            // Reset Variabel Menyeluruh
            skorMentah = 0;
            indexSoal = 0;
            kuisArray = acakArray(bankSoal); // Acak urutan soal
            
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            // Menampilkan nama dan kelas di Profile Bar
            document.getElementById('teksNama').innerHTML = `👤 <strong>${namaUser.toUpperCase()}</strong>`;
            document.getElementById('teksKelas').innerText = `Kelas: ${kelasUser}`;
            
            tampilkanSoal();
        }

        function tampilkanSoal() {
            isAnswered = false; // Reset flag
            const soalData = kuisArray[indexSoal];
            
            document.getElementById('soalCounter').innerText = `Soal: ${indexSoal + 1} / ${kuisArray.length}`;
            document.getElementById('pembahasanContainer').style.display = 'none';
            document.getElementById('btnNext').style.display = 'none';
            document.getElementById('btnSelesai').style.display = 'none';

            let htmlSoal = `<div class="question-text">${indexSoal + 1}. ${soalData.pertanyaan}</div>`;
            
            if(soalData.gambar) {
                htmlSoal += `<img src="${soalData.gambar}" alt="Gambar Soal ${indexSoal+1}" class="question-image" onerror="this.style.display='none'">`;
            }

            // Pengacakan opsi jawaban (Trik Pilihan Jawaban)
            let opsiDenganIndex = soalData.pilihan.map((teks, i) => ({ teks, indeksAsli: i }));
            opsiDenganIndex = acakArray(opsiDenganIndex);

            let htmlOpsi = `<div class="options-grid">`;
            opsiDenganIndex.forEach(opsi => {
                htmlOpsi += `<button class="option-btn" onclick="cekJawaban(this, ${opsi.indeksAsli}, ${soalData.jawabanBenar})">${opsi.teks}</button>`;
            });
            htmlOpsi += `</div>`;

            document.getElementById('soalContainer').innerHTML = htmlSoal + htmlOpsi;
            updateSkorTampilan();
        }

        function cekJawaban(btn, indeksDipilih, indeksBenar) {
            if(isAnswered) return; // Mencegah klik ganda (Flagging)
            isAnswered = true;

            const semuaTombol = document.querySelectorAll('.option-btn');
            semuaTombol.forEach(b => {
                b.style.pointerEvents = 'none'; // Matikan semua tombol
                // Tampilkan mana yang benar
                if(b.getAttribute('onclick').includes(`, ${indeksBenar},`)) {
                    b.classList.add('correct');
                }
            });

            if (indeksDipilih === indeksBenar) {
                btn.classList.add('correct');
                skorMentah++; // Tambah mentah
            } else {
                btn.classList.add('wrong');
            }

            updateSkorTampilan();

            // Tampilkan Pembahasan
            const boxBahas = document.getElementById('pembahasanContainer');
            boxBahas.innerHTML = `<strong>Pembahasan:</strong> ${kuisArray[indexSoal].pembahasan}`;
            boxBahas.style.display = 'block';

            if (indexSoal < kuisArray.length - 1) {
                document.getElementById('btnNext').style.display = 'block';
            } else {
                document.getElementById('btnSelesai').style.display = 'block';
            }
        }

        function updateSkorTampilan() {
            // Perhitungan Berbasis Persentase & Pembatas Maksimal 100
            let persentaseSkor = Math.round((skorMentah / kuisArray.length) * 100);
            let skorAkhir = Math.min(persentaseSkor, SKOR_MAKSIMAL);
            document.getElementById('liveScore').innerText = `Skor Sementara: ${skorAkhir}`;
        }

        function soalSelanjutnya() {
            indexSoal++;
            tampilkanSoal();
        }

        function selesaiKuis() {
            // Kalkulasi skor final absolut
            let persentaseSkor = Math.round((skorMentah / kuisArray.length) * 100);
            let skorAkhir = Math.min(persentaseSkor, SKOR_MAKSIMAL);

            // 1. Ubah tombol menjadi mode loading
            const btnSelesai = document.getElementById('btnSelesai');
            btnSelesai.innerText = "Menyimpan Data...";
            btnSelesai.disabled = true;

            // 2. Simpan ke localStorage Global (Komunikasi dengan rekap.html)
            const dataRekap = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            dataRekap.push({
                nama: namaUser,
                kelas: kelasUser,
                mapel: KODE_MAPEL, // <-- DIKEMBALIKAN KE KODE_MAPEL AGAR MUNCUL DI LAYAR DEPAN
                nilai: skorAkhir,
                waktu: new Date().toLocaleString('id-ID')
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dataRekap));

            // 3. KIRIM DATA KE GOOGLE SHEETS GURU
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwzCsI_5uv5jreQHSiNW5Dej7Iu-5Sui0uYhwIWGFwcsm8kM09C20JMwjDO8ZZRMGAs/exec'; 
            
            const payload = {
                nama: namaUser,
                kelas: kelasUser,
                mapel: "IPAS", // <-- TETAP "IPAS" AGAR RAPI DI GOOGLE SHEETS
                nilai: skorAkhir
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => {
                alert(`Kuis Selesai!\nSkor Akhir Anda: ${skorAkhir}\nData Anda telah berhasil direkam ke dalam sistem.`);
                window.location.reload(); 
            })
            .catch(error => {
                console.error("Gagal mengirim ke server guru:", error);
                alert(`Pemberitahuan: Skor Anda (${skorAkhir}) tersimpan di perangkat, namun koneksi ke server guru sedang terganggu.`);
                window.location.reload(); 
            });
        }
    </script>
</body>
</html>

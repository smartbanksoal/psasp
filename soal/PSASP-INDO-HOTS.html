// ==========================================
// STATE MANAGEMENT & LIMITER
// ==========================================
let soalAcak = [];
let indeksSaatIni = 0;
let jawabanUser = []; // Menyimpan status benar/salah tiap nomor
let dataSiswa = { nama: "", kelas: "" };

// ==========================================
// FUNGSI UTAMA
// ==========================================

function muatRiwayat() {
    const dataRekap = JSON.parse(localStorage.getItem('dataKuis')) || [];
    const tbody = document.getElementById('history-table-body');
    tbody.innerHTML = '';
    
    if (dataRekap.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada riwayat.</td></tr>';
        return;
    }

    // Tampilkan 5 riwayat terakhir di login screen
    const riwayatTampil = dataRekap.slice(-5).reverse();
    riwayatTampil.forEach(data => {
        tbody.innerHTML += `
            <tr>
                <td>${data.nama}</td>
                <td>${data.kelas}</td>
                <td>${data.waktu}</td>
                <td><strong>${data.nilai}</strong></td>
            </tr>
        `;
    });
}

function acakArray(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function mulaiKuis() {
    const inputNama = document.getElementById('nama').value.trim();
    const inputKelas = document.getElementById('kelas').value.trim();

    if (!inputNama || !inputKelas) {
        alert("Silakan isi Nama dan Kelas terlebih dahulu!");
        return;
    }

    dataSiswa.nama = inputNama;
    dataSiswa.kelas = inputKelas;

    // Persiapan Variabel (Flagging & Reset)
    soalAcak = acakArray(bankSoal);
    // Acak posisi pilihan ganda pada tiap soal
    soalAcak = soalAcak.map(soal => {
        let pilihanDenganIndexAsli = soal.pilihan.map((teks, index) => ({ teks, isCorrect: index === soal.jawabanBenar }));
        pilihanDenganIndexAsli = acakArray(pilihanDenganIndexAsli);
        return { ...soal, pilihanAcak: pilihanDenganIndexAsli };
    });

    indeksSaatIni = 0;
    jawabanUser = new Array(soalAcak.length).fill(null); 

    // Ganti View
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('headerHomeBtn').classList.remove('hidden');

    tampilkanSoal();
    hitungSkorSementara();
}

function goHome() {
    if(confirm("Apakah Anda yakin ingin keluar? Progres kuis tidak akan tersimpan.")) {
        window.location.reload();
    }
}

function tampilkanSoal() {
    const soal = soalAcak[indeksSaatIni];
    
    // Set Teks Soal
    document.getElementById('question-text').innerText = `${indeksSaatIni + 1}. ${soal.pertanyaan}`;
    
    // Set Gambar Soal (jika ada)
    const imgEl = document.getElementById('question-image');
    if (soal.gambar) {
        imgEl.src = soal.gambar;
        imgEl.alt = soal.keterangan;
        imgEl.classList.remove('hidden');
    } else {
        imgEl.classList.add('hidden');
    }

    // Render Pilihan
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    
    soal.pilihanAcak.forEach((pil, index) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = `${String.fromCharCode(65 + index)}. ${pil.teks}`;
        
        // Cek jika sudah dijawab
        if (jawabanUser[indeksSaatIni] !== null) {
            div.classList.add('disabled');
            if (pil.isCorrect) div.classList.add('correct');
            else if (jawabanUser[indeksSaatIni] === index) div.classList.add('incorrect');
        } else {
            div.onclick = () => pilihJawaban(index, pil.isCorrect, div);
        }
        
        optionsContainer.appendChild(div);
    });

    // Kontrol Visibilitas Pembahasan & Navigasi
    const pembahasanEl = document.getElementById('pembahasan');
    if (jawabanUser[indeksSaatIni] !== null) {
        document.getElementById('teks-pembahasan').innerText = soal.pembahasan;
        pembahasanEl.style.display = 'block';
    } else {
        pembahasanEl.style.display = 'none';
    }

    document.getElementById('btn-prev').style.display = indeksSaatIni > 0 ? 'inline-block' : 'none';
    document.getElementById('btn-next').style.display = 'inline-block';
    
    if (indeksSaatIni === soalAcak.length - 1 && jawabanUser[indeksSaatIni] !== null) {
        document.getElementById('btn-next').innerText = "Selesai Kuis";
        document.getElementById('btn-next').onclick = selesaikanKuis;
    } else {
        document.getElementById('btn-next').innerText = "Selanjutnya \u2192";
        document.getElementById('btn-next').onclick = soalSelanjutnya;
        if(jawabanUser[indeksSaatIni] === null) {
             document.getElementById('btn-next').style.display = 'none'; // Sembunyikan Next sebelum dijawab
        }
    }
}

function pilihJawaban(indexPilihan, isCorrect, divElemen) {
    if (jawabanUser[indeksSaatIni] !== null) return; // Proteksi ganda

    jawabanUser[indeksSaatIni] = {
        terpilihIndex: indexPilihan,
        benar: isCorrect
    };

    // Warnai Pilihan
    const semuaOpsi = document.querySelectorAll('.option');
    semuaOpsi.forEach((opsi, idx) => {
        opsi.classList.add('disabled');
        if (soalAcak[indeksSaatIni].pilihanAcak[idx].isCorrect) {
            opsi.classList.add('correct');
        }
    });

    if (!isCorrect) {
        divElemen.classList.add('incorrect');
    }

    // Tampilkan Pembahasan
    document.getElementById('teks-pembahasan').innerText = soalAcak[indeksSaatIni].pembahasan;
    document.getElementById('pembahasan').style.display = 'block';

    hitungSkorSementara();
    
    // Tampilkan Tombol Next/Selesai
    const btnNext = document.getElementById('btn-next');
    btnNext.style.display = 'inline-block';
    if (indeksSaatIni === soalAcak.length - 1) {
        btnNext.innerText = "Selesai Kuis";
        btnNext.onclick = selesaikanKuis;
    }
}

function soalSelanjutnya() {
    if (indeksSaatIni < soalAcak.length - 1) {
        indeksSaatIni++;
        tampilkanSoal();
    }
}

function soalSebelumnya() {
    if (indeksSaatIni > 0) {
        indeksSaatIni--;
        tampilkanSoal();
    }
}

function hitungSkorSementara() {
    // LIMITER LOGIC: Menghitung ulang berdasarkan array state, bukan akumulasi sederhana
    const jumlahBenar = jawabanUser.filter(jawab => jawab && jawab.benar === true).length;
    let persentase = Math.round((jumlahBenar / soalAcak.length) * 100);
    
    // Hard Limiter memastikan skor mentok di 100
    if (persentase > 100) persentase = 100;
    
    document.getElementById('temp-score').innerText = persentase;
    return persentase;
}

function selesaikanKuis() {
    const finalScore = hitungSkorSementara();
    
    // Ubah tombol menjadi mode loading
    const btnSelesai = document.getElementById('btn-next');
    btnSelesai.innerText = "Menyimpan Data...";
    btnSelesai.disabled = true;
    
    // Format Waktu
    const sekarang = new Date();
    const waktuFormat = `${sekarang.getDate()}/${sekarang.getMonth()+1}/${sekarang.getFullYear()} ${sekarang.getHours()}:${sekarang.getMinutes()}`;

    // 1. SIMPAN KE LOCALSTORAGE (Riwayat Lokal di Perangkat Siswa)
    const hasilBaru = {
        nama: dataSiswa.nama,
        kelas: dataSiswa.kelas,
        mapel: "Bahasa Indonesia",
        nilai: finalScore,
        waktu: waktuFormat
    };

    let dataRekap = JSON.parse(localStorage.getItem('dataKuis')) || [];
    dataRekap.push(hasilBaru);
    localStorage.setItem('dataKuis', JSON.stringify(dataRekap));

    // 2. KIRIM DATA KE GOOGLE SHEETS GURU
    // Ganti teks di bawah ini dengan URL Web App dari Google Apps Script Bapak
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwzCsI_5uv5jreQHSiNW5Dej7Iu-5Sui0uYhwIWGFwcsm8kM09C20JMwjDO8ZZRMGAs/exec'; 
    
    const payload = {
        nama: dataSiswa.nama,
        kelas: dataSiswa.kelas,
        mapel: "Bahasa Indonesia",
        nilai: finalScore
    };

    fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify(payload)
    })
    .then(response => {
        // Jika sukses terkirim, tampilkan layar hasil
        tampilkanLayarHasilAkhir(finalScore);
    })
    .catch(error => {
        // Jika internet siswa bermasalah, tetap tampilkan layar hasil
        console.error("Gagal mengirim ke server guru:", error);
        alert("Pemberitahuan: Skor Anda tersimpan di perangkat, namun koneksi ke server guru sedang terganggu.");
        tampilkanLayarHasilAkhir(finalScore);
    });
}

// Tambahkan fungsi bantuan ini tepat di bawah selesaikanKuis()
function tampilkanLayarHasilAkhir(skor) {
    // Pindah ke View Hasil
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('headerHomeBtn').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    
    // Tampilkan skor besar
    document.getElementById('final-score').innerText = skor;
    
    // Kembalikan status tombol
    const btnSelesai = document.getElementById('btn-next');
    btnSelesai.innerText = "Selesai Kuis";
    btnSelesai.disabled = false;
}

// Inisialisasi awal
document.addEventListener('DOMContentLoaded', muatRiwayat);
